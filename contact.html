  <style>
    .contact-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      padding: 120px 24px 80px;
    }
    .contact-card {
      max-width: 540px;
      width: 100%;
      text-align: center;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 60px 40px;
    }
    .contact-card img {
      width: 80px;
      border-radius: 12px;
      margin: 0 auto 24px;
    }
    .contact-card h1 {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      margin-bottom: 12px;
      text-shadow: 0 0 30px rgba(45,212,191,.3);
    }
    .contact-card p {
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .contact-email {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(45,212,191,.25);
      border-radius: 10px;
      padding: 16px 28px;
      font-size: 1.05rem;
      color: var(--teal);
      letter-spacing: .02em;
      transition: border-color .3s ease, box-shadow .3s ease;
      text-decoration: none;
    }
    .contact-email:hover {
      border-color: rgba(45,212,191,.5);
      box-shadow: 0 0 20px rgba(45,212,191,.15);
    }
    .contact-email svg { flex-shrink: 0; }
    .contact-socials {
      margin-top: 36px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .contact-socials a {
      color: var(--text-muted);
      transition: color .3s ease;
    }
    .contact-socials a:hover { color: var(--teal); }
    .contact-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--teal);
      font-size: .9rem;
      margin-bottom: 32px;
      transition: opacity .3s ease;
    }
    .contact-back:hover { opacity: .7; }
  </style>
</head>
